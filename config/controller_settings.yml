---
redhat_subscription_client_id: "{{ redhat_client_id }}"
redhat_subscription_client_secret: "{{ redhat_client_secret }}"

controller_license:
  use_lookup: true
  filters:
    product_name: "Red Hat Ansible Automation Platform"
    support_level: "Standard"
    
controller_settings:
  settings:
    SESSION_COOKIE_AGE: 1800
    REDHAT_USERNAME: "{{ redhat_client_id }}"
    REDHAT_PASSWORD: "{{ redhat_client_secret }}"
    INSIGHTS_TRACKING_STATE: true
    SUBSCRIPTIONS_CLIENT_ID: "{{ redhat_client_id }}"
    SUBSCRIPTIONS_CLIENT_SECRET: "{{ redhat_client_secret }}"
